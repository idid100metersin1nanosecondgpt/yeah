<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>idid100metresin1nanosecondgpt</title>
  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      background-color: #0f172a;
      font-family: Arial, sans-serif;
      color: white;
    }

    button {
      padding: 20px 40px;
      font-size: 18px;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      background: #22c55e;
      color: black;
      transition: transform 0.2s ease;
      margin: 10px;
    }

    button:hover {
      transform: scale(1.1);
    }

    #message {
      margin-top: 20px;
      font-size: 20px;
      text-align: center;
      max-width: 80%;
    }

    #proofBtn {
      display: none;
    }
  </style>
</head>
<body>

<button onclick="showMessage()">Press Me</button>
<button id="proofBtn" onclick="showProof()">Show Proof</button>

<div id="message"></div>

<script>
  function showMessage() {
    document.getElementById('message').innerText = 
      "karma is slow at swimming, and mosaab, zeyad and ignacio finished 1000 metres in 5 seconds - 4";

    document.getElementById('proofBtn').style.display = 'inline-block';
  }

  function showProof() {
    const img = document.createElement('img');
    img.src = 'karma.png';
    img.style.maxWidth = '80%';
    img.style.marginTop = '20px';

    const messageDiv = document.getElementById('message');
    messageDiv.innerHTML = '';
    messageDiv.appendChild(img);
  }
</script>

</body>
</html>
